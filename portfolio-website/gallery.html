<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - My Portfolio</title>
    <!-- Link external CSS stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header section containing website title and navigation -->
    <header>
        <div class="container">
            <!-- Website logo/title -->
            <h1 class="logo">My Portfolio</h1>
            <!-- Navigation bar using semantic nav tag -->
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <!-- Current page highlighted -->
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="contact.html">Contact Me</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Gallery header section -->
        <section class="gallery-header">
            <div class="container">
                <h2>My Photo Gallery</h2>
            </div>
        </section>

        <!-- Photo gallery grid section -->
        <section class="gallery-section">
            <div class="container">
                <div class="gallery-grid">
                    <!-- Photo 1: Personal Portrait -->
                    <article class="gallery-item">
                        <div class="gallery-image">
                            <img src=C:\Users\19136\Desktop\111\photo3.jpg.png class="gallery-img">
                        </div>
                    </article>

                    <!-- Photo 2: Travel Photo -->
                    <article class="gallery-item">
                        <div class="gallery-image">
                            <img src=C:\Users\19136\Desktop\111\photo2.jpg.png class="gallery-img">
                        </div>
                    </article>

                    <!-- Photo 3: Hobby Photo -->
                    <article class="gallery-item">
                        <div class="gallery-image">
                            <img src=C:\Users\19136\Desktop\111\photo4.jpg.png class="gallery-img">
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <!-- Interactive section -->
        <section class="interactive-section">
            <div class="container">
                <h2 class="section-title">Interactive Experience</h2>
                
                <!-- Username input feature -->
                <div class="input-section">
                    <label for="username-input">Please enter your name:</label>
                    <input type="text" id="username-input" placeholder="Enter your name here">
                    <button id="submit-name" class="btn-primary">Confirm</button>
                </div>

                <!-- Button color change feature -->
                <div class="color-section">
                    <p>Click the button below to change its color:</p>
                    <button id="color-btn" class="color-change-btn">Click to Change Color</button>
                </div>

                <!-- Popup feature -->
                <div class="popup-section">
                    <p>Click the button to display screen information:</p>
                    <button id="info-btn" class="btn-secondary">Show Screen Info</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer section -->
    <footer>
        <div class="container">
            <p>&copy; 2026 My Personal Portfolio. All rights reserved.</p>
            <p>Built with HTML, CSS, and JavaScript</p>
        </div>
    </footer>

    <!-- Link external JavaScript file -->
    <script src="js/main.js"></script>
</body>
</html>
